name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  node-and-structure:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run typecheck
      - run: npm test
      - run: bash nix/scripts/dev-milestone-registry-check.sh
      - run: bash nix/scripts/dev-milestone-script-audit-check.sh
      - run: bash nix/scripts/dev-windows-path-budget-check.sh
